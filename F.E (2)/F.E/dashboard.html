
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم - WORLD CUP 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #071A24;
    --bg-soft: #102A33;
    --text: #F4F1E8;
    --gold: #D4AF37;
    --gold-2: #F2D27A;
    --line: rgba(255,255,255,.16);
    --surface: rgba(255,255,255,.06);
    --shadow: 0 14px 35px rgba(0,0,0,.35);
    --green: #2ECC71;
    --red: #C0392B;
    --yellow: #F1C40F;
    --gray: #7F8C8D;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    font-family: 'Cairo', sans-serif;
    color: var(--text);
    background: linear-gradient(rgba(3, 20, 25, .9), rgba(3, 20, 25, .98)), url("theme.jpg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    padding: 20px;
  }

  .container {
    max-width: 1000px;
    margin: 0 auto;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 0;
    border-bottom: 1px solid var(--line);
    margin-bottom: 30px;
  }

  .header-btns {
    display: flex;
    gap: 12px;
  }

  .btn {
    padding: 8px 18px;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    font-size: 0.9rem;
    transition: 0.3s;
    border: 1px solid transparent;
  }

  .btn-gold {
    background: linear-gradient(135deg, #D4AF37, #A97918);
    color: #000;
  }

  .btn-outline {
    border: 1px solid var(--line);
    color: #fff;
    background: rgba(255,255,255,0.05);
  }

  .btn-logout {
    background: rgba(192, 57, 43, 0.15);
    border: 1px solid #C0392B;
    color: #ff8e8e;
  }

  h1, h2 {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 2px;
    color: var(--gold);
    margin-bottom: 15px;
  }

  .panel {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 24px;
    backdrop-filter: blur(10px);
  }

  /* Section 1: Account info */
  .account-info {
    display: flex;
    gap: 40px;
  }
  .info-item {
    display: flex;
    flex-direction: column;
  }
  .info-label { font-size: 0.75rem; color: var(--gold-2); opacity: 0.7; margin-bottom: 4px; }
  .info-val { font-size: 1.1rem; font-weight: 800; }

  /* Table styling */
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
  }
  th {
    text-align: right;
    font-size: 0.75rem;
    color: var(--gold-2);
    padding: 12px;
    border-bottom: 1px solid var(--line);
  }
  td {
    padding: 14px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 0.9rem;
  }

  /* Badges */
  .badge-row { display: flex; gap: 4px; align-items: center; margin-top: 6px; }
  .badge {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    font-weight: 900;
    color: #fff;
  }
  .bg-W { background: var(--green); }
  .bg-D { background: var(--yellow); color: #000; }
  .bg-L { background: var(--red); }
  .bg-- { background: var(--gray); opacity: 0.3; }

  /* Stats cards */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
  }
  .stat-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--line);
    padding: 14px;
    border-radius: 14px;
    text-align: center;
  }
  .sc-teams { font-size: 0.8rem; font-weight: 800; margin-bottom: 6px; }
  .sc-val { font-size: 0.7rem; color: var(--gold-2); }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--gold-2);
    opacity: 0.6;
    font-style: italic;
  }
</style>
</head>
<body>

<div class="container" style="max-width: 600px; margin-top: 50px;">
  <header style="border-bottom: none; display: flex; justify-content: space-between; align-items: center;">
    <div>
      <h1 id="welcomeTitle">لوحة التحكم</h1>
    </div>
    <div id="userHeaderSection">
      <!-- Fixed header will go here if needed, but we can also just show username and logout -->
      <span style="color: var(--text); font-weight: 700;">مرحباً <span id="userVal">—</span></span>
      <button onclick="handleLogout()" class="btn btn-logout" style="margin-right: 12px; padding: 4px 12px; font-size: 0.8rem;">خروج</button>
    </div>
  </header>

  <section class="panel" style="text-align: center; padding: 40px;">
    <div style="font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; color: #fff;">
      توقعات صحيحة: <span id="correctCount" style="color: var(--green);">0</span>
    </div>
    <div style="font-size: 1.5rem; font-weight: bold; color: #fff;">
      توقعات خاطئة: <span id="wrongCount" style="color: var(--red);">0</span>
    </div>
    <div style="margin-top: 30px;">
      <a href="worldcup_ai_predictor_generated_matches_round32.html" class="btn btn-outline" style="padding: 10px 20px;">العودة للمباريات</a>
    </div>
  </section>
</div>

<script>
  const API_BASE = 'http://localhost:5000/api';
  const token = localStorage.getItem('wc_token');
  const storedUser = localStorage.getItem('wc_username');

  async function init() {
    if (!token) {
      document.body.innerHTML = `
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; font-family: 'Cairo', sans-serif;">
          <h2 style="color: #D4AF37;">سجّل دخول لرؤية توقعاتك</h2>
          <a href="login.html" style="background: #D4AF37; color: #000; padding: 12px 24px; border-radius: 12px; text-decoration: none; font-weight: 900;">تسجيل دخول</a>
          <a href="worldcup_ai_predictor_generated_matches_round32.html" style="color: #fff; text-decoration: underline; font-size: 0.9rem;">العودة للمباريات كضيف</a>
        </div>
      `;
      return;
    }

    document.getElementById('userVal').textContent = storedUser;
    loadStats();
  }

  async function loadStats() {
    const token = localStorage.getItem('wc_token');
    if (!token) return;
    try {
      const res = await fetch('http://localhost:5000/api/prediction_stats', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      document.getElementById('correctCount').textContent = data.correct || 0;
      document.getElementById('wrongCount').textContent   = data.wrong   || 0;
    } catch(e) {}
  }

  async function handleLogout() {
    if (token) {
      try {
        await fetch(`${API_BASE}/logout`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` }
        });
      } catch (e) {}
    }
    localStorage.removeItem('wc_token');
    localStorage.removeItem('wc_username');
    window.location.href = 'worldcup_ai_predictor_generated_matches_round32.html';
  }

  init();
</script>

</body>
</html>
