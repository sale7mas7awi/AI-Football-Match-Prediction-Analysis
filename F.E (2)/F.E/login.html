<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - WORLD CUP 2026</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Bebas+Neue&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #071A24;
      --bg-soft: #102A33;
      --text: #F4F1E8;
      --gold: #D4AF37;
      --gold-2: #F2D27A;
      --line: rgba(255, 255, 255, .16);
      --surface: rgba(255, 255, 255, .06);
      --shadow: 0 14px 35px rgba(0, 0, 0, .35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: 'Cairo', sans-serif;
      color: var(--text);
      background: linear-gradient(rgba(3, 20, 25, .85), rgba(3, 20, 25, .95)), url("theme.jpg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: rgba(4, 20, 33, 0.95);
      border: 1px solid var(--line);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--line);
    }

    .tab {
      flex: 1;
      padding: 18px;
      text-align: center;
      cursor: pointer;
      font-weight: 700;
      color: var(--text);
      opacity: 0.5;
      transition: 0.3s;
      background: rgba(255, 255, 255, 0.02);
    }

    .tab.active {
      opacity: 1;
      border-bottom: 3px solid var(--gold);
      color: var(--gold);
      background: transparent;
    }

    .form-container {
      padding: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 8px;
      color: var(--text);
      opacity: 0.8;
    }

    input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--line);
      color: #fff;
      font-size: 1rem;
      transition: 0.3s;
    }

    input:focus {
      outline: none;
      border-color: var(--gold);
      background: rgba(255, 255, 255, 0.1);
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #D4AF37, #A97918);
      color: #000;
      font-weight: 900;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
    }

    .error-msg {
      background: rgba(192, 57, 43, 0.15);
      border: 1px solid #C0392B;
      color: #ff8e8e;
      padding: 12px;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: none;
      text-align: center;
    }

    .logo-section {
      text-align: center;
      padding: 24px 0 10px;
    }

    .logo-section img {
      width: 80px;
      margin: 0 auto 10px;
    }

    .logo-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 4px;
      color: var(--gold);
    }
  </style>
</head>

<body>

  <div id="videoIntro" style="position:fixed;top:0;left:0;
       width:100%;height:100%;background:#000;z-index:9999;">

    <video id="introVideo" autoplay muted playsinline
           style="width:100%;height:100%;object-fit:cover;"
           src="World Cup 2026 - Official Intro.mp4">
    </video>

    <button id="muteBtn"
      style="position:fixed;bottom:30px;right:30px;z-index:10000;
             background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.3);
             color:#fff;padding:8px 16px;border-radius:20px;
             font-size:13px;cursor:pointer;">
      تشغيل الصوت
    </button>

    <div style="position:absolute;bottom:30px;left:0;width:100%;
                text-align:center;color:rgba(255,255,255,.5);font-size:12px;">
      اضغط في أي مكان للتخطي
    </div>
  </div>

  <div class="login-card">
    <div class="logo-section">
      <img src="pngegg.png" alt="FIFA Trophy">
      <div class="logo-title">WORLD CUP 2026</div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="showTab('login')">تسجيل دخول</div>
      <div class="tab" onclick="showTab('register')">إنشاء حساب</div>
    </div>

    <div class="form-container">
      <div id="errorAlert" class="error-msg"></div>

      <!-- Login Form -->
      <form id="loginForm" onsubmit="handleLogin(event)" style="display:none;">
        <div class="form-group">
          <input type="text" id="loginUsername" placeholder="اسم المستخدم" required>
        </div>
        <div class="form-group">
          <input type="password" id="loginPassword" placeholder="كلمة السر" required>
        </div>
        <button type="submit" class="btn">دخول</button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" onsubmit="handleRegister(event)" style="display:none;">
        <div class="form-group">
          <input type="text" id="regUsername" placeholder="اسم المستخدم" required>
        </div>
        <div class="form-group">
          <input type="password" id="regPassword" placeholder="كلمة السر" required>
        </div>
        <div class="form-group">
          <input type="password" id="regConfirmPassword" placeholder="تأكيد كلمة السر" required>
        </div>
        <button type="submit" class="btn">إنشاء حساب</button>
      </form>

      <div style="text-align: center; margin-top: 24px;">
        <a href="worldcup_ai_predictor_generated_matches_round32.html"
          style="color: var(--gold-2); font-size: 0.85rem; text-decoration: none; opacity: 0.8;">← العودة للمباريات</a>
      </div>
    </div>
  </div>

  <script>
    function showTab(type) {
      const tabs = document.querySelectorAll('.tab');
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      const errorAlert = document.getElementById('errorAlert');

      errorAlert.style.display = 'none';

      if (type === 'login') {
        tabs[0].classList.add('active');
        tabs[1].classList.remove('active');
        loginForm.style.display = 'block';
        registerForm.style.display = 'none';
      } else {
        tabs[0].classList.remove('active');
        tabs[1].classList.add('active');
        loginForm.style.display = 'none';
        registerForm.style.display = 'block';
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('loginUsername').value;
      const password = document.getElementById('loginPassword').value;
      const errorAlert = document.getElementById('errorAlert');

      try {
        const res = await fetch('http://localhost:5000/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (res.ok && data.token) {
          localStorage.setItem('wc_token', data.token);
          localStorage.setItem('wc_username', username);
          localStorage.setItem('wc_just_logged_in', '1');
          window.location.href = 'worldcup_ai_predictor_generated_matches_round32.html';
        } else {
          errorAlert.textContent = "اسم المستخدم أو كلمة السر غير صحيحة";
          errorAlert.style.display = 'block';
        }
      } catch (err) {
        errorAlert.textContent = "تعذر الاتصال بالخادم";
        errorAlert.style.display = 'block';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const username = document.getElementById('regUsername').value;
      const password = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regConfirmPassword').value;
      const errorAlert = document.getElementById('errorAlert');

      const englishOnly = /^[A-Za-z0-9!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?`~]*$/;
      if (!englishOnly.test(password)) {
        errorAlert.textContent = "كلمة السر يجب أن تكون بالإنجليزية فقط (أحرف، أرقام، أو رموز)";
        errorAlert.style.display = 'block';
        return;
      }
      if (password.length < 8) {
        errorAlert.textContent = "كلمة السر يجب أن تكون 8 أحرف على الأقل";
        errorAlert.style.display = 'block';
        return;
      }
      if (password.length > 64) {
        errorAlert.textContent = "كلمة السر يجب ألا تتجاوز 64 حرفاً";
        errorAlert.style.display = 'block';
        return;
      }

      if (password !== confirm) {
        errorAlert.textContent = "كلمات السر غير متطابقة";
        errorAlert.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('http://localhost:5000/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (res.ok) {
          // Auto login
          const loginRes = await fetch('http://localhost:5000/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });
          const loginData = await loginRes.json();
          if (loginRes.ok && loginData.token) {
            localStorage.setItem('wc_token', loginData.token);
            localStorage.setItem('wc_username', username);
            localStorage.setItem('wc_just_logged_in', '1');
          window.location.href = 'worldcup_ai_predictor_generated_matches_round32.html';
          }
        } else {
          errorAlert.textContent = data.error || "اسم المستخدم مستخدم مسبقاً";
          errorAlert.style.display = 'block';
        }
      } catch (err) {
        errorAlert.textContent = "تعذر الاتصال بالخادم";
        errorAlert.style.display = 'block';
      }
    }
  </script>

  <script>
    var video   = document.getElementById('introVideo');
    var intro   = document.getElementById('videoIntro');
    var form    = document.getElementById('loginForm');
    var muteBtn = document.getElementById('muteBtn');

    function showForm() {
      intro.style.display = 'none';
      form.style.display  = 'block';
    }

    video.addEventListener('ended', showForm);
    video.addEventListener('error', showForm);
    setTimeout(showForm, 35000);

    intro.addEventListener('click', function(e) {
      if (e.target === muteBtn) return;
      showForm();
    });

    muteBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      video.muted = !video.muted;
      muteBtn.textContent = video.muted ? 'تشغيل الصوت' : 'كتم الصوت';
    });
  </script>
</body>

</html>
