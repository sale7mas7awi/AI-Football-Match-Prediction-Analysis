<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 — Bracket</title>
<link rel="stylesheet" href="Qualification .css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
/* ── MODAL STYLES ── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(2,9,14,.74);
  backdrop-filter: blur(8px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 18px;
}
.overlay.open { display: flex; }
.modal {
  width: min(600px, 100%);
  border-radius: 22px;
  background: #111111;
  border: 1px solid rgba(255,255,255,.08);
  box-shadow: 0 24px 60px rgba(0,0,0,.36);
  padding: 26px 24px;
  animation: modalPop .25s ease;
  font-family: 'Cairo', sans-serif;
  direction: rtl;
}
@keyframes modalPop {
  from { opacity: 0; transform: scale(.96) translateY(10px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}
.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.35rem;
  letter-spacing: 2px;
  color: #f2d580;
}
.modal-close {
  width: 34px; height: 34px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,.08);
  background: transparent;
  color: #90a9ba;
  cursor: pointer;
  font-size: 1rem;
}
.modal-close:hover { background: #e85a4f; color: #fff; border-color: #e85a4f; }
.modal-meta {
  font-size: .76rem;
  color: #90a9ba;
  margin-bottom: 18px;
}
.modal-teams {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 18px;
}
.mt-team { flex: 1; text-align: center; }
.mt-flag {
  width: 74px; height: 50px;
  margin: 0 auto 8px;
  object-fit: cover;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,.12);
  box-shadow: 0 8px 18px rgba(0,0,0,.22);
  display: block;
}
.mt-name { font-size: .88rem; font-weight: 900; line-height: 1.3; color: #e7f1f7; }
.mt-rank { margin-top: 3px; font-size: .68rem; color: #90a9ba; }
.mt-vs {
  padding: 0 8px;
  font-size: 1.6rem;
  color: #90a9ba;
  font-family: 'Bebas Neue', sans-serif;
}
.pred-label {
  text-align: center;
  color: #90a9ba;
  font-size: .72rem;
  letter-spacing: 1px;
  margin-bottom: 10px;
}
.pred-opts {
  display: grid;
  gap: 8px;
  grid-template-columns: repeat(2, minmax(0,1fr));
  margin-bottom: 16px;
}
.pred-opt {
  min-height: 62px;
  border: 1.5px solid rgba(255,255,255,.14);
  background: transparent;
  color: #e7f1f7;
  border-radius: 14px;
  font-size: .76rem;
  font-weight: 800;
  cursor: pointer;
  padding: 10px 6px;
  transition: .2s ease;
  font-family: 'Cairo', sans-serif;
}
.pred-opt:hover { border-color: #c9a84c; color: #f2d580; }
.pred-opt.sel {
  border-color: #c9a84c;
  color: #f2d580;
  background: rgba(201,168,76,.12);
}
.modal-note {
  padding: 10px 12px;
  border-radius: 12px;
  background: rgba(103,211,245,.08);
  border: 1px solid rgba(103,211,245,.14);
  color: #67d3f5;
  font-size: .72rem;
  line-height: 1.7;
  margin-bottom: 16px;
}
.modal-cta {
  width: 100%;
  border: none;
  border-radius: 14px;
  padding: 12px 14px;
  background: linear-gradient(135deg, #c9a84c, #a67a1c);
  color: #13212b;
  font-weight: 900;
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  font-size: 1rem;
}
.modal-cta:disabled { opacity: .42; cursor: not-allowed; }

/* ── RESULT PAGE ── */
.result-page {
  position: fixed;
  inset: 0;
  z-index: 1100;
  display: none;
  overflow-y: auto;
  background: #0f0f0f !important;
  padding: 28px 18px 50px;
  font-family: 'Cairo', sans-serif;
  direction: rtl;
}
.result-page.open { display: block; animation: fadePage .25s ease; }
@keyframes fadePage {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.rp-inner { max-width: 900px; margin: 0 auto; }
.rp-top-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  margin-bottom: 22px;
}
.rp-back {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid rgba(255,255,255,.08);
  background: #1a1a1a;
  color: #F0F0F0;
  border-radius: 12px;
  padding: 10px 16px;
  cursor: pointer;
  font-weight: 800;
  font-family: 'Cairo', sans-serif;
}
.rp-back:hover { border-color: #c9a84c; color: #f2d580; }
.live-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 999px;
  border: 1px solid rgba(103,211,245,.2);
  background: rgba(103,211,245,.08);
  color: #67d3f5;
  font-size: .74rem;
  font-weight: 800;
}
.rp-matchup {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 16px;
  align-items: center;
  padding: 22px;
  border-radius: 22px;
  border: 1px solid rgba(255,255,255,.08);
  background: #0f0f0f;
  margin-bottom: 18px;
}
.rp-team { text-align: center; }
.rp-flag {
  width: 94px; height: 64px;
  object-fit: cover;
  border-radius: 14px;
  margin: 0 auto;
  border: 1px solid rgba(255,255,255,.12);
  display: block;
}
.rp-tname { margin-top: 10px; font-size: 1.08rem; font-weight: 900; color: #e7f1f7; }
.rp-team-meta { margin-top: 4px; font-size: .72rem; color: #90a9ba; }
.rp-vs-block { text-align: center; }
.rp-vs { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; color: #f2d580; }
.rp-match-info { color: #90a9ba; font-size: .75rem; line-height: 1.8; }
.panel {
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,.08);
  background: #0f0f0f;
  padding: 20px;
  margin-bottom: 16px;
  color: #F0F0F0;
}
.result-card { text-align: center; border-color: rgba(201,168,76,.18); }
.rc-label { color: #90a9ba; font-size: .7rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 800; }
.rc-result { margin-top: 12px; font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: #f2d580; }
.rc-conf { margin-top: 6px; font-size: .84rem; color: #90a9ba; }
.ai-source-note {
  margin-top: 12px; padding: 9px 12px; border-radius: 12px;
  background: rgba(103,211,245,.08); border: 1px solid rgba(103,211,245,.14);
  color: #67d3f5; font-size: .72rem; line-height: 1.7;
}
.prob-row + .prob-row { margin-top: 14px; }
.prob-row-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
.prob-name { font-size: .83rem; font-weight: 800; }
.prob-pct { font-size: .82rem; font-weight: 900; color: #f2d580; }
.prob-bar-bg { height: 10px; background: rgba(255,255,255,.06); border-radius: 999px; overflow: hidden; }
.prob-bar-fill { height: 100%; border-radius: 999px; transition: width .55s ease; }
.pf-win  { background: linear-gradient(90deg, #19a0cd, #67d3f5); }
.pf-draw { background: linear-gradient(90deg, #c9a84c, #f2d580); }
.pf-loss { background: linear-gradient(90deg, #cc493e, #e85a4f); }
.block-title { color: #90a9ba; font-size: .7rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 800; margin-bottom: 14px; }
.analysis-title { color: #90a9ba; font-size: .7rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 800; margin-bottom: 12px; }
.analysis-point { display: flex; gap: 10px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,.08); font-size: .84rem; line-height: 1.8; }
.analysis-point:last-child { border-bottom: none; }
.ap-icon { flex-shrink: 0; }
.compare-row { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; }
.compare-card { border-radius: 16px; border: 1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.02); padding: 16px; text-align: center; }
.cc-label { color: #90a9ba; font-size: .68rem; letter-spacing: 1.6px; text-transform: uppercase; font-weight: 800; }
.cc-val { margin-top: 8px; font-size: 1rem; font-weight: 900; }
.cc-sub { margin-top: 5px; color: #90a9ba; font-size: .72rem; }
.loading-state { padding: 22px; border-radius: 16px; border: 1px dashed rgba(103,211,245,.22); background: rgba(103,211,245,.06); color: #67d3f5; text-align: center; font-weight: 800; }
.loading-block { display: grid; justify-items: center; gap: 14px; }
.spinner { width: 34px; height: 34px; border-radius: 50%; border: 3px solid rgba(255,255,255,.18); border-top-color: #67d3f5; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-box { padding: 14px 16px; border-radius: 14px; border: 1px solid rgba(232,90,79,.22); background: rgba(232,90,79,.10); color: #ffd8d4; line-height: 1.8; font-size: .82rem; }
.retry-btn { margin-top: 12px; border: 1px solid rgba(255,255,255,.18); background: rgba(255,255,255,.05); color: #fff; padding: 10px 14px; border-radius: 12px; cursor: pointer; font-weight: 800; font-family: 'Cairo', sans-serif; }
.footer-note { margin-top: 18px; text-align: center; color: #90a9ba; font-size: .75rem; }
.chart-wrap { margin-top: 18px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,.08); min-height: 240px; }
.chart-note { margin-top: 10px; font-size: .72rem; color: #90a9ba; text-align: center; }
.small-title { color: #90a9ba; font-size: .7rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 800; }
.result-grid { display: grid; grid-template-columns: 1.1fr .9fr; gap: 16px; margin-bottom: 16px; }
@media (max-width: 700px) {
  .result-grid, .compare-row { grid-template-columns: 1fr; }
  .rp-matchup { grid-template-columns: 1fr; text-align: center; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="header-emblem"><div class="trophy">
  <img src="pngegg.png" style="width:50px;height:50px;object-fit:contain;">
</div></div>
    <div>
      <div class="header-title">FIFA WORLD CUP 2026</div>
      <div class="header-sub">KNOCKOUT BRACKET — ROAD TO THE FINAL</div>
    </div>
  </div>
  <div id="userHeaderSection"></div>
  <a href="worldcup_ai_predictor_generated_matches_round32.html" class="back-btn">← Back to Groups</a>
</div>


<!-- BRACKET -->
<div class="bracket-page">
<div class="champions-title">WORLD CHAMPIONS</div>
<div class="bracket" id="bracket"></div>
</div>

<!-- LEGEND -->
<div class="legend">
  <div class="leg-item"><div class="leg-dot" style="background:var(--accent-2)"></div>Round of 32</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--green)"></div>Round of 16</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--gold)"></div>Quarter-Final</div>
  <div class="leg-item"><div class="leg-dot" style="background:#e85a4f"></div>Semi-Final</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--gold-2)"></div>Final</div>
</div>

<!-- MODAL التوقع -->
<div class="overlay" id="modalOverlay">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <div class="modal-title">توقّع النتيجة</div>
      <button class="modal-close" type="button" id="closeModalBtn">✕</button>
    </div>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="modal-teams">
      <div class="mt-team">
        <img class="mt-flag" id="mf1" alt="">
        <div class="mt-name" id="mn1"></div>
        <div class="mt-rank" id="mr1"></div>
      </div>
      <div class="mt-vs">VS</div>
      <div class="mt-team">
        <img class="mt-flag" id="mf2" alt="">
        <div class="mt-name" id="mn2"></div>
        <div class="mt-rank" id="mr2"></div>
      </div>
    </div>
    <div class="pred-label">— اختر توقعك —</div>
    <div class="pred-opts">
      <button class="pred-opt" id="po1" type="button"></button>
      <button class="pred-opt" id="po2" type="button" style="display:none;">تعادل<br>X</button>
            <button class="pred-opt" id="po3" type="button"></button>
    </div>

    <button class="modal-cta" id="modalCta" type="button" disabled>عرض التحليل والتوقع</button>
  </div>
</div>

<!-- صفحة النتيجة -->
<div class="result-page" id="resultPage">
  <div class="rp-inner">
    <div class="rp-top-row">
      <button class="rp-back" id="backToMatchesBtn" type="button">← العودة للبراكيت</button>

    </div>
    <div class="rp-matchup">
      <div class="rp-team">
        <img class="rp-flag" id="rpF1" alt="">
        <div class="rp-tname" id="rpN1"></div>
        <div class="rp-team-meta" id="rpMeta1"></div>
      </div>
      <div class="rp-vs-block">
        <div class="rp-vs">VS</div>
        <div class="rp-match-info" id="rpInfo"></div>
      </div>
      <div class="rp-team">
        <img class="rp-flag" id="rpF2" alt="">
        <div class="rp-tname" id="rpN2"></div>
        <div class="rp-team-meta" id="rpMeta2"></div>
      </div>
    </div>
    <div id="resultContent"></div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="Qualification.js"></script>

</body>
</html>
